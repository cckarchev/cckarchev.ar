<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Greathelm Card Generator</title>

  <style>
    @import url("https://fonts.googleapis.com/css2?family=MedievalSharp&family=IM+Fell+English+SC&display=swap");

    :root {
      --font-card: "MedievalSharp", "IM Fell English SC", Georgia, serif;
      --ink: #1d160d;
      --ink-light: rgba(29, 22, 13, 0.48);
      --paper-a: #f0dfb4;
      --paper-b: #e2c98f;
      --paper-c: #b48d53;
      --black: #000;
      --panel: #181510;
      --panel-border: #5a482f;
      --panel-text: #f4e8cd;
      --gold: #c8a252;
      --green: #2b9743;
      --red: #b11724;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: clamp(10px, 2vw, 24px);
      display: grid;
      grid-template-columns: minmax(300px, 390px) minmax(0, 1fr);
      gap: clamp(12px, 2vw, 24px);
      align-items: start;
      background: #ededed;
      color: var(--ink);
      font-family: var(--font-card);
    }

    .controls {
      position: sticky;
      top: 12px;
      z-index: 10;
      max-height: calc(100vh - 24px);
      overflow: auto;
      padding: 18px;
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      background: var(--panel);
      color: var(--panel-text);
      box-shadow: 0 10px 24px rgb(0 0 0 / 18%);
    }

    .controls h1 {
      margin: 0 0 14px;
      color: #f6ead0;
      font-size: 22px;
    }

    .control-label {
      display: block;
      margin: 13px 0 6px;
      color: #ead8ae;
      font-size: 14px;
    }

    .controls input[type="text"],
    .controls textarea,
    .controls select {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid #7c6440;
      border-radius: 8px;
      background: #241f18;
      color: #fff7e3;
      font: 14px var(--font-card);
    }

    .controls textarea {
      min-height: 68px;
      resize: vertical;
    }

    .controls input[type="file"] {
      width: 100%;
      color: #ead8ae;
      font-family: var(--font-card);
    }

    .control-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .control-note {
      margin: 6px 0 0;
      color: #bfae8e;
      font-size: 12px;
      line-height: 1.25;
    }

    .check-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
    }

    .check-row input { width: 18px; height: 18px; }
    .check-row label { margin: 0; color: #ead8ae; font-size: 14px; }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 11px 14px;
      border: 0;
      border-radius: 10px;
      background: var(--gold);
      color: #1d1408;
      font: 700 15px var(--font-card);
      cursor: pointer;
    }

    .secondary-button {
      background: #5a482f;
      color: var(--panel-text);
    }

    .workspace {
      width: 100%;
      min-width: 0;
      overflow-x: auto;
      padding-bottom: 24px;
    }

    .preview-area {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      width: 100%;
      padding: 12px 0 24px;
      overflow: visible;
    }

    .preview-scale {
      transform: scale(var(--preview-scale, 1));
      transform-origin: top center;
    }

    .unit-card {
      width: 12cm;
      height: 7cm;
      flex: 0 0 auto;
      padding: .18cm;
      overflow: hidden;
      border-radius: .24cm;
      background: var(--black);
      box-shadow: 0 10px 26px rgb(0 0 0 / 25%);
      font-family: var(--font-card);
    }

    .unit-card.is-poker {
      width: 8.89cm;
      height: 6.35cm;
    }

    .card-grid {
      display: grid;
      grid-template-columns: 64% 36%;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border: 2px solid var(--black);
      border-radius: .20cm;
      background: var(--paper-b);
    }

    .panel {
      position: relative;
      min-width: 0;
      min-height: 0;
    }

    .parchment {
      background:
        radial-gradient(circle at 12% 12%, rgb(255 255 255 / 28%), transparent 20%),
        radial-gradient(circle at 84% 20%, rgb(122 83 35 / 18%), transparent 28%),
        radial-gradient(circle at 30% 76%, rgb(87 58 25 / 14%), transparent 24%),
        radial-gradient(circle at 70% 72%, rgb(255 248 220 / 14%), transparent 18%),
        repeating-linear-gradient(9deg, rgb(73 47 19 / 6%) 0 1px, transparent 1px 7px),
        repeating-linear-gradient(103deg, rgb(255 247 219 / 6%) 0 1px, transparent 1px 11px),
        repeating-radial-gradient(circle at 18% 24%, rgb(49 30 10 / 10%) 0 1px, transparent 1px 5px),
        linear-gradient(135deg, var(--paper-a), var(--paper-b) 55%, var(--paper-c));
    }

    .parchment::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: .65;
      mix-blend-mode: multiply;
      background:
        radial-gradient(circle at 8% 8%, rgb(80 45 14 / 18%) 0 1px, transparent 2px),
        radial-gradient(circle at 16% 90%, rgb(80 45 14 / 13%) 0 1px, transparent 2px),
        radial-gradient(circle at 92% 24%, rgb(80 45 14 / 15%) 0 1px, transparent 2px);
    }

    .panel > * {
      position: relative;
      z-index: 1;
    }

    .card-info {
      padding: .25cm .28cm .22cm .34cm;
      border-right: 3px solid var(--black);
      color: var(--ink);
    }

    .name-row {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: .16cm;
      align-items: end;
      margin-bottom: .10cm;
    }

    .name-label {
      font-size: .30cm;
      font-weight: 700;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .name-value {
      min-height: .38cm;
      padding-top: .02cm;
      border-bottom: 2.2px solid var(--ink);
      font-size: .39cm;
      font-weight: 700;
      line-height: 1.02;
    }

    .equipment-list {
      display: grid;
      grid-template-rows: 1.25fr 1fr 1.15fr;
      row-gap: .09cm;
      height: calc(100% - .50cm);
    }

    .field {
      min-height: 0;
      overflow: hidden;
    }

    .field-header {
      margin-bottom: .05cm;
      font-size: .31cm;
      font-weight: 700;
      line-height: 1;
    }

    .field-body {
      font-size: .235cm;
      line-height: 1.14;
    }

    .field-item { margin-bottom: .035cm; }
    .field-item strong { font-size: .255cm; }
    .rule-text { opacity: .93; }

    .write-line-wrap { margin-top: .16cm; }

    .write-line {
      width: 100%;
      height: .30cm;
      border-bottom: 1.1px dotted var(--ink-light);
    }

    .card-portrait { overflow: hidden; }

    .portrait-image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      filter: contrast(1.03) saturate(1.04);
    }

    .portrait-image[hidden],
    .portrait-placeholder[hidden] {
      display: none !important;
    }

    .portrait-placeholder {
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      padding: 16px;
      color: rgb(29 22 13 / 66%);
      font-size: 14px;
      text-align: center;
    }

    .hearts {
      position: absolute;
      left: 50%;
      bottom: .20cm;
      z-index: 3;
      display: grid;
      justify-items: center;
      align-items: center;
      padding: .08cm .14cm;
      border: 2.4px solid #120b08;
      border-radius: .22cm;
      background: rgb(18 10 8 / 82%);
      box-shadow: 0 2px 6px rgb(0 0 0 / 45%), inset 0 0 0 1px rgb(255 255 255 / 8%);
      transform: translateX(-50%);
    }

    .hearts.is-hidden { display: none; }

    .hearts.is-foot {
      grid-template-columns: repeat(3, auto);
      gap: .10cm;
    }

    .hearts.is-mounted {
      grid-template-columns: repeat(3, auto);
      grid-template-rows: repeat(2, auto);
      gap: .07cm .09cm;
      padding: .08cm .12cm;
    }

    .heart {
      display: block;
      width: .64cm;
      height: .58cm;
    }

    .heart svg {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
      filter: drop-shadow(0 1px 1px rgb(0 0 0 / 28%));
    }

    .sheet-title {
      margin: 24px 0 12px;
      color: var(--ink);
      font-size: 20px;
    }

    .print-sheet {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      width: 100%;
      align-items: flex-start;
    }

    .print-sheet .unit-card { box-shadow: none; }

    .is-poker .card-grid { border-radius: .15cm; }
    .is-poker .card-info { padding: .20cm .22cm .18cm .26cm; }
    .is-poker .name-row { margin-bottom: .06cm; }
    .is-poker .name-label { font-size: .23cm; }
    .is-poker .name-value { min-height: .32cm; font-size: .30cm; }
    .is-poker .equipment-list { height: calc(100% - .40cm); row-gap: .07cm; }
    .is-poker .field-header { margin-bottom: .035cm; font-size: .25cm; }
    .is-poker .field-body { font-size: .195cm; line-height: 1.10; }
    .is-poker .field-item strong { font-size: .21cm; }
    .is-poker .write-line-wrap { margin-top: .11cm; }
    .is-poker .write-line { height: .23cm; }
    .is-poker .hearts { bottom: .18cm; }
    .is-poker .hearts.is-foot { gap: .08cm; padding: .06cm .10cm; }
    .is-poker .hearts.is-mounted { gap: .05cm .07cm; padding: .06cm .09cm; }
    .is-poker .heart { width: .50cm; height: .45cm; }

    @media print {
      body {
        display: block;
        padding: 0;
        background: #fff;
      }

      .controls,
      .preview-area,
      .sheet-title {
        display: none;
      }

      .workspace {
        display: block;
        overflow: visible;
        padding: 0;
      }

      .print-sheet {
        display: flex;
        flex-wrap: wrap;
        gap: .15cm;
        padding: 0;
      }

      .unit-card {
        margin: 0;
        break-inside: avoid;
        box-shadow: none;
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
      }
    }

    @media (max-width: 980px) {
      body { grid-template-columns: 1fr; }
      .controls { position: static; max-height: none; }
      .preview-area { overflow: hidden; }
    }
  </style>
</head>
<body>
  <form class="controls" id="controls" onsubmit="return false;">
    <h1>Greathelm Card Generator</h1>

    <label class="control-label" for="unitName">Name</label>
    <input id="unitName" type="text" placeholder="Leave empty for handwriting" />

    <label class="control-label" for="armorSelect">Armor</label>
    <select id="armorSelect"></select>

    <label class="control-label" for="weaponLoadout">Weapon loadout</label>
    <select id="weaponLoadout">
      <option value="one-free">One hand weapon + free hand</option>
      <option value="one-shield">One hand weapon + shield</option>
      <option value="two-handed">One two-handed weapon</option>
      <option value="dual-same">Two of the same one hand weapon</option>
      <option value="dual-different">Two different one hand weapons</option>
    </select>

    <div id="shieldTypeGroup">
      <label class="control-label" for="shieldType">Shield type</label>
      <select id="shieldType"></select>
    </div>

    <div class="control-grid">
      <div>
        <label class="control-label" for="weaponPrimary">Weapon 1</label>
        <select id="weaponPrimary"></select>
      </div>
      <div id="weaponSecondaryGroup">
        <label class="control-label" for="weaponSecondary">Weapon 2</label>
        <select id="weaponSecondary"></select>
      </div>
    </div>
    <p class="control-note" id="loadoutNote"></p>

    <label class="control-label" for="wornItem">Worn item</label>
    <select id="wornItem"></select>

    <label class="control-label" for="useItem">Use item</label>
    <select id="useItem"></select>

    <label class="control-label" for="consumableItem">Consumable item</label>
    <select id="consumableItem"></select>

    <label class="control-label" for="weaponUpgrade">Weapon upgrade</label>
    <select id="weaponUpgrade"></select>

    <label class="control-label" for="armorUpgrade">Armor upgrade</label>
    <select id="armorUpgrade"></select>

    <label class="control-label" for="legendaryWorn">Legendary worn item</label>
    <select id="legendaryWorn"></select>

    <label class="control-label" for="legendaryUse">Legendary use item</label>
    <select id="legendaryUse"></select>

    <label class="control-label" for="legendaryArmor">Legendary armor</label>
    <select id="legendaryArmor"></select>

    <label class="control-label" for="legendaryWeaponUpgrade">Legendary weapon upgrade</label>
    <select id="legendaryWeaponUpgrade"></select>

    <div class="check-row">
      <input id="showHearts" type="checkbox" />
      <label for="showHearts">Show hearts</label>
    </div>

    <label class="control-label" for="unitType">Unit type</label>
    <select id="unitType" disabled>
      <option value="foot" selected>On foot — 3 hearts</option>
      <option value="mounted">Mounted — 6 hearts</option>
    </select>

    <label class="control-label" for="cardSize">Card size</label>
    <select id="cardSize">
      <option value="tarot" selected>Tarot — 12 cm × 7 cm</option>
      <option value="poker">Poker — 8.89 cm × 6.35 cm</option>
    </select>

    <label class="control-label" for="modelImage">Upload model image</label>
    <input id="modelImage" type="file" accept="image/*" />

    <button type="button" id="addToSheet">Add card to print sheet</button>
    <button type="button" id="exportPng">Export current card as PNG</button>
    <button type="button" onclick="window.print()">Print / Save as PDF</button>
    <button type="button" id="clearSheet" class="secondary-button">Clear print sheet</button>
  </form>

  <main class="workspace">
    <div class="preview-area" id="previewArea">
      <div class="preview-scale" id="previewScale">
        <section class="unit-card" id="unitCard">
          <div class="card-grid">
            <div class="panel card-info parchment">
              <div class="name-row">
                <div class="name-label">Name</div>
                <div class="name-value" id="nameOutput"></div>
              </div>

              <div class="equipment-list">
                <section class="field">
                  <div class="field-header">Weapons</div>
                  <div class="field-body" id="weaponsOutput"></div>
                </section>

                <section class="field">
                  <div class="field-header">Armor</div>
                  <div class="field-body" id="armorOutput"></div>
                </section>

                <section class="field">
                  <div class="field-header">Items</div>
                  <div class="field-body" id="itemsOutput"></div>
                </section>
              </div>
            </div>

            <div class="panel card-portrait parchment">
              <div class="portrait-placeholder" id="portraitPlaceholder">Upload a model image</div>
              <img class="portrait-image" id="portraitImage" alt="Uploaded model" hidden />
              <div class="hearts is-hidden" id="heartTray"></div>
            </div>
          </div>
        </section>
      </div>
    </div>

    <h2 class="sheet-title">Print Sheet</h2>
    <section class="print-sheet" id="printSheet"></section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>

        legendaryWorn: [
          ['ancient-amulet', 'Ancient Amulet', 'Momentum limit is increased by 1.'],
          ['belt-of-bashing', 'Belt of Bashing', 'Deal 1 automatic damage to the defender when you win a clash using a bash action.'],
          ['belt-of-blocking', 'Belt of Blocking', 'Move the attacker 2” away when you win a clash by defending with a block.'],
          ['belt-of-dodging', 'Belt of Dodging', 'Move up to 3” away when you win a clash by defending with a dodge.'],
          ['orle-of-disdain', 'Orle of Disdain', 'Deal 1 automatic damage to an enemy in base contact after you pass a courage test.'],
          ['soul-ring', 'Soul Ring', 'When you win a clash as the attacker, you may steal 1 momentum from the defender.']
        ],
        legendaryUse: [
          ['ancient-artifact', 'Ancient Artifact', 'Use to raise the artifact. When raised, remove up to 2 gruesomely slain markers.'],
          ['dark-mirror', 'Dark Mirror', 'Use to raise the dark mirror. When raised, force a single enemy knight within 3” to immediately perform a courage test.'],
          ['orle-of-light', 'Orle of Light', 'Use to force all enemy knights within 3” to perform a shift action. Move up to 1”. Cannot contact enemy.'],
          ['ornate-banner', 'Ornate Banner', 'Use to raise the banner until the end of the turn. While raised, allied knights automatically pass courage tests.'],
          ['swan-horn', 'Swan Horn', 'Use to blow horn. When blown, redistribute d6 momentum within the play area.'],
          ['tear-of-alethea', 'Tear of Alethea', 'Use to raise the tear. When raised, immediately remove up to 2 damage from allied knights within 2”.']
        ],
        legendaryArmor: [
          ['armor-wraith', 'Armor of the Wraith', 'Roll 1d6 on the armor table when suffering damage. When you pass a courage test, all enemy knights within 3” test courage.'],
          ['armor-bear', 'Armor of the Bear', 'Roll 1d6 on the armor table when suffering damage. You begin the game with 2 momentum.'],
          ['armor-lion', 'Armor of the Lion', 'Roll 1d6 on the armor table when suffering damage. When you battle cry, allies gain momentum on 3+ instead of 4+.'],
          ['armor-mountain', 'Armor of the Mountain', 'Roll 1d6 on the armor table when suffering damage. Bash actions only move you 1”.'],
          ['armor-blade', 'Armor of the Blade', 'Roll 1d6 on the armor table when suffering damage. When you roll a perfect clash, the clash test ends and you win.'],
          ['ancestral-heavy-armor', 'Ancestral Heavy Armor', 'Roll 2d6 on the armor table when suffering damage and take the highest result.']
        ],
        legendaryWeaponUpgrade: [
          ['ancestral-shield', 'Ancestral Shield upgrade', 'Roll 2d6 when defending with a block and take the highest result.'],
          ['biting-blade', 'Biting Blade upgrade', 'Deal 2 damage to the attacker when you win a clash by defending with a riposte.'],
          ['defenders-blade', 'Defenders Blade upgrade', 'Counts as an allied knight during a clash test when in base contact with the attacker or defender.'],
          ['gorgons-shield', 'Gorgon’s Shield upgrade', 'Deal 1 damage to the attacker when you win a clash by defending with a block.'],
          ['mirror-blade', 'Mirror Blade upgrade', 'Deal 1 damage to the attacker when you win a clash by defending with a parry.'],
          ['vipers-blade', 'Vipers Blade upgrade', 'Light attacks deal 2 damage.']
        ]
      }
    };

    const SYSTEM_RULES = {
      freeHand: ['free-hand', 'Free Hand', '+1 bonus to clash test when performing bash actions.'],
      dualSame: ['dual-same', 'Dual Wielding', 'Two of the same one-handed weapon: +1 to parry defense. Weapon abilities do not stack.'],
      dualDifferent: ['dual-different', 'Dual Wielding', 'Two different one-handed weapons: choose one weapon to use when you attack and when you defend.']
    };

    const dom = {
      input: {
        name: document.getElementById('unitName'),
        armor: document.getElementById('armorSelect'),
        loadout: document.getElementById('weaponLoadout'),
        shieldType: document.getElementById('shieldType'),
        shieldTypeGroup: document.getElementById('shieldTypeGroup'),
        weaponA: document.getElementById('weaponPrimary'),
        weaponB: document.getElementById('weaponSecondary'),
        weaponBGroup: document.getElementById('weaponSecondaryGroup'),
        loadoutNote: document.getElementById('loadoutNote'),
        wornItem: document.getElementById('wornItem'),
        useItem: document.getElementById('useItem'),
        consumableItem: document.getElementById('consumableItem'),
        weaponUpgrade: document.getElementById('weaponUpgrade'),
        armorUpgrade: document.getElementById('armorUpgrade'),
        legendaryWorn: document.getElementById('legendaryWorn'),
        legendaryUse: document.getElementById('legendaryUse'),
        legendaryArmor: document.getElementById('legendaryArmor'),
        legendaryWeaponUpgrade: document.getElementById('legendaryWeaponUpgrade'),
        showHearts: document.getElementById('showHearts'),
        unitType: document.getElementById('unitType'),
        cardSize: document.getElementById('cardSize'),
        modelImage: document.getElementById('modelImage'),
        addToSheet: document.getElementById('addToSheet'),
        exportPng: document.getElementById('exportPng'),
        clearSheet: document.getElementById('clearSheet')
      },
      card: {
        root: document.getElementById('unitCard'),
        name: document.getElementById('nameOutput'),
        weapons: document.getElementById('weaponsOutput'),
        armor: document.getElementById('armorOutput'),
        items: document.getElementById('itemsOutput'),
        image: document.getElementById('portraitImage'),
        placeholder: document.getElementById('portraitPlaceholder'),
        hearts: document.getElementById('heartTray')
      },
      preview: {
        area: document.getElementById('previewArea'),
        scale: document.getElementById('previewScale')
      },
      sheet: document.getElementById('printSheet')
    };

    const toItem = ([id, name, rules]) => ({ id, name, rules });

    const catalog = {
      armor: EQUIPMENT.armor.map(toItem),
      shields: EQUIPMENT.shields.map(toItem),
      oneHanded: EQUIPMENT.oneHanded.map(toItem),
      twoHanded: EQUIPMENT.twoHanded.map(toItem),
      items: Object.fromEntries(Object.entries(EQUIPMENT.items).map(([key, list]) => [key, list.map(toItem)]))
    };

    const state = {
      name: '',
      armor: 'heavy-armor',
      loadout: 'one-free',
      shieldType: 'heater',
      weaponA: 'arming-sword',
      weaponB: 'hand-ax',
      selections: {},
      showHearts: false,
      unitType: 'foot',
      cardSize: 'tarot'
    };

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function fillSelect(select, items, includeNone = false) {
      const emptyOption = includeNone ? '<option value="">None</option>' : '';
      select.innerHTML = emptyOption + items.map(item => `<option value="${item.id}">${item.name}</option>`).join('');
    }

    function findById(items, id) {
      return items.find(item => item.id === id) || null;
    }

    function readForm() {
      const input = dom.input;

      state.name = input.name.value.trim();
      state.armor = input.armor.value;
      state.loadout = input.loadout.value;
      state.shieldType = input.shieldType.value;
      state.weaponA = input.weaponA.value;
      state.weaponB = input.weaponB.value;
      state.showHearts = input.showHearts.checked;
      state.unitType = input.unitType.value;
      state.cardSize = input.cardSize.value;

      state.selections = {
        worn: input.wornItem.value,
        use: input.useItem.value,
        consumable: input.consumableItem.value,
        weaponUpgrade: input.weaponUpgrade.value,
        armorUpgrade: input.armorUpgrade.value,
        legendaryWorn: input.legendaryWorn.value,
        legendaryUse: input.legendaryUse.value,
        legendaryArmor: input.legendaryArmor.value,
        legendaryWeaponUpgrade: input.legendaryWeaponUpgrade.value
      };
    }

    function setupSelects() {
      fillSelect(dom.input.armor, catalog.armor);
      dom.input.armor.value = 'heavy-armor';

      fillSelect(dom.input.shieldType, catalog.shields);
      dom.input.shieldType.value = 'heater';
      fillSelect(dom.input.weaponA, catalog.oneHanded);
      fillSelect(dom.input.weaponB, catalog.oneHanded);

      fillSelect(dom.input.wornItem, catalog.items.worn, true);
      fillSelect(dom.input.useItem, catalog.items.use, true);
      fillSelect(dom.input.consumableItem, catalog.items.consumable, true);
      fillSelect(dom.input.weaponUpgrade, catalog.items.weaponUpgrade, true);
      fillSelect(dom.input.armorUpgrade, catalog.items.armorUpgrade, true);
      fillSelect(dom.input.legendaryWorn, catalog.items.legendaryWorn, true);
      fillSelect(dom.input.legendaryUse, catalog.items.legendaryUse, true);
      fillSelect(dom.input.legendaryArmor, catalog.items.legendaryArmor, true);
      fillSelect(dom.input.legendaryWeaponUpgrade, catalog.items.legendaryWeaponUpgrade, true);
    }

    function currentLoadout() {
      const primaryOneHanded = findById(catalog.oneHanded, state.weaponA);
      const secondaryOneHanded = findById(catalog.oneHanded, state.weaponB);
      const primaryTwoHanded = findById(catalog.twoHanded, state.weaponA);

      switch (state.loadout) {
        case 'one-shield':
          return {
            hasShield: true,
            weapons: [primaryOneHanded].filter(Boolean),
            extras: [],
            note: 'One hand weapon and shield.'
          };

        case 'two-handed':
          return {
            hasShield: false,
            weapons: [primaryTwoHanded].filter(Boolean),
            extras: [],
            note: 'One two-handed weapon.'
          };

        case 'dual-same':
          return {
            hasShield: false,
            weapons: [primaryOneHanded].filter(Boolean),
            extras: [toItem(SYSTEM_RULES.dualSame)],
            note: 'Two of the same one hand weapon. Weapon abilities do not stack.'
          };

        case 'dual-different':
          return {
            hasShield: false,
            weapons: [primaryOneHanded, secondaryOneHanded].filter(Boolean),
            extras: [toItem(SYSTEM_RULES.dualDifferent)],
            note: 'Two different one hand weapons. Choose one when attacking and defending.'
          };

        default:
          return {
            hasShield: false,
            weapons: [primaryOneHanded].filter(Boolean),
            extras: [toItem(SYSTEM_RULES.freeHand)],
            note: 'One hand weapon and a free hand. +1 to bash clash tests.'
          };
      }
    }

    function updateWeaponSelectors() {
      const isTwoHanded = dom.input.loadout.value === 'two-handed';
      const usesSecondWeapon = dom.input.loadout.value === 'dual-different';
      const usesShield = dom.input.loadout.value === 'one-shield';
      const options = isTwoHanded ? catalog.twoHanded : catalog.oneHanded;
      const previous = dom.input.weaponA.value;

      fillSelect(dom.input.weaponA, options);
      if (options.some(item => item.id === previous)) dom.input.weaponA.value = previous;

      dom.input.weaponBGroup.hidden = !usesSecondWeapon;
      dom.input.shieldTypeGroup.hidden = !usesShield;
      dom.input.loadoutNote.textContent = currentLoadout().note;
    }

    function lineItem(item) {
      if (!item) return '';
      return `<div class="field-item"><strong>${escapeHtml(item.name)}:</strong> <span class="rule-text">${escapeHtml(item.rules)}</span></div>`;
    }

    function blankLine() {
      return '<div class="write-line-wrap"><div class="write-line"></div></div>';
    }

    function renderWeapons() {
      const loadout = currentLoadout();
      const rows = [...loadout.weapons, ...loadout.extras];
      dom.card.weapons.innerHTML = rows.length ? rows.map(lineItem).join('') : blankLine();
    }

    function renderArmor() {
      const baseArmor = findById(catalog.armor, state.armor);
      const legendaryArmor = findById(catalog.items.legendaryArmor, state.selections.legendaryArmor);
      const armorUpgrade = findById(catalog.items.armorUpgrade, state.selections.armorUpgrade);
      const shield = currentLoadout().hasShield ? findById(catalog.shields, state.shieldType) : null;
      const rows = [legendaryArmor || baseArmor, shield, armorUpgrade].filter(Boolean);

      dom.card.armor.innerHTML = rows.length ? rows.map(lineItem).join('') : blankLine();
    }

    function renderItems() {
      const ignored = new Set(['armorUpgrade', 'legendaryArmor']);
      const rows = Object.entries(state.selections)
        .filter(([key, id]) => id && !ignored.has(key))
        .map(([key, id]) => findById(catalog.items[key] || [], id))
        .filter(Boolean);

      dom.card.items.innerHTML = rows.length ? rows.map(lineItem).join('') : blankLine();
    }

    function renderHearts() {
      dom.input.unitType.disabled = !state.showHearts;
      dom.card.hearts.className = 'hearts';

      if (!state.showHearts) {
        dom.card.hearts.classList.add('is-hidden');
        dom.card.hearts.innerHTML = '';
        return;
      }

      const mounted = state.unitType === 'mounted';
      const count = mounted ? 6 : 3;
      dom.card.hearts.classList.add(mounted ? 'is-mounted' : 'is-foot');
      dom.card.hearts.innerHTML = Array.from({ length: count }, heartMarkup).join('');
    }

    function heartMarkup() {
      return `
        <div class="heart">
          <svg viewBox="0 0 64 58" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path
              d="M32 53 C28 49, 7 35, 7 19 C7 10, 14 5, 22 5 C27 5, 31 8, 32 12 C33 8, 37 5, 42 5 C50 5, 57 10, 57 19 C57 35, 36 49, 32 53 Z"
              fill="#d51f31"
              stroke="#2b1209"
              stroke-width="4.6"
              stroke-linejoin="round"
            />
            <path
              d="M20 14 C22 11, 27 11, 29 15"
              fill="none"
              stroke="rgba(255,255,255,.62)"
              stroke-width="3.6"
              stroke-linecap="round"
            />
          </svg>
        </div>`;
    }

    function renderCard() {
      readForm();
      updateWeaponSelectors();
      readForm();

      dom.card.root.classList.toggle('is-poker', state.cardSize === 'poker');
      dom.card.name.textContent = state.name;
      renderWeapons();
      renderArmor();
      renderItems();
      renderHearts();

      requestAnimationFrame(fitPreview);
    }

    function fitPreview() {
      dom.preview.scale.style.setProperty('--preview-scale', 1);

      const cardBox = dom.card.root.getBoundingClientRect();
      const availableWidth = Math.max(280, dom.preview.area.clientWidth - 24);
      const preferredScale = window.innerWidth > 1200 ? 1.55 : window.innerWidth > 800 ? 1.25 : 1;
      const scale = Math.max(0.55, Math.min(preferredScale, availableWidth / cardBox.width));

      dom.preview.scale.style.setProperty('--preview-scale', scale);
      dom.preview.area.style.minHeight = `${cardBox.height * scale + 44}px`;
    }

    function loadModelImage(event) {
      const file = event.target.files?.[0];
      if (!file) return;

      const imageUrl = URL.createObjectURL(file);
      const image = dom.card.image;
      const placeholder = dom.card.placeholder;

      image.onload = () => {
        if (image.dataset.objectUrl) URL.revokeObjectURL(image.dataset.objectUrl);
        image.dataset.objectUrl = imageUrl;
        fitPreview();
      };

      image.src = imageUrl;
      image.hidden = false;
      image.removeAttribute('hidden');
      image.style.display = 'block';

      placeholder.hidden = true;
      placeholder.setAttribute('hidden', '');
      placeholder.style.display = 'none';
    }

    async function waitForAssets() {
      if (document.fonts?.ready) await document.fonts.ready;

      const image = dom.card.image;
      if (!image.hidden && image.src && image.decode) {
        try { await image.decode(); } catch (error) {}
      }
    }

    function cloneCard() {
      const clone = dom.card.root.cloneNode(true);
      clone.removeAttribute('id');
      clone.querySelectorAll('[id]').forEach(node => node.removeAttribute('id'));
      clone.style.transform = 'none';
      clone.style.boxShadow = 'none';
      return clone;
    }

    async function exportPng() {
      renderCard();
      await waitForAssets();

      const host = document.createElement('div');
      Object.assign(host.style, {
        position: 'fixed',
        left: '-10000px',
        top: '0',
        background: 'transparent',
        zIndex: '-1'
      });

      const clone = cloneCard();
      host.appendChild(clone);
      document.body.appendChild(host);
      await new Promise(resolve => requestAnimationFrame(resolve));

      const canvas = await html2canvas(clone, {
        scale: 4,
        backgroundColor: null,
        useCORS: true,
        logging: false
      });

      document.body.removeChild(host);

      const name = (state.name || 'greathelm-card').replace(/[^a-z0-9_-]+/gi, '-').toLowerCase();
      const link = document.createElement('a');
      link.download = `${name}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    function addCardToSheet() {
      renderCard();
      dom.sheet.appendChild(cloneCard());
    }

    function clearSheet() {
      dom.sheet.innerHTML = '';
    }

    function bindEvents() {
      const input = dom.input;
      const liveControls = [
        input.name, input.armor, input.loadout, input.shieldType, input.weaponA, input.weaponB,
        input.wornItem, input.useItem, input.consumableItem, input.weaponUpgrade,
        input.armorUpgrade, input.legendaryWorn, input.legendaryUse,
        input.legendaryArmor, input.legendaryWeaponUpgrade,
        input.showHearts, input.unitType, input.cardSize
      ];

      liveControls.forEach(control => {
        control.addEventListener('input', renderCard);
        control.addEventListener('change', renderCard);
      });

      input.modelImage.addEventListener('change', loadModelImage);
      input.exportPng.addEventListener('click', exportPng);
      input.addToSheet.addEventListener('click', addCardToSheet);
      input.clearSheet.addEventListener('click', clearSheet);
      window.addEventListener('resize', fitPreview);
    }

    setupSelects();
    bindEvents();
    renderCard();
  </script>
</body>
</html>
